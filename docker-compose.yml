services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hakeem-postgres
    environment:
      POSTGRES_DB: hakeem
      POSTGRES_USER: hakeem
      POSTGRES_PASSWORD: hakeem_password
    ports:
      - "5432:5432"
    volumes:
      - hakeem-postgres-data:/var/lib/postgresql/data

  # أداة معالجة الوثائق العربية — رفع/استخراج/تطبيع/فهرسة/بحث (FastAPI)
  doc-tool:
    build: ./tools/arabic-doc-tool
    container_name: hakeem-doc-tool
    environment:
      # اتركه فارغاً للتشغيل خلف شبكة داخلية فقط، أو ضع كلمة مرور للنشر العام
      APP_PASSWORD: ${DOC_TOOL_PASSWORD:-}
      SESSION_SECRET: ${DOC_TOOL_SESSION_SECRET:-}
      TOOL_DB: /data/tool_docs.db
    ports:
      - "8080:8080"
    volumes:
      - hakeem-doc-tool-data:/data

  # ── طبقة التحويل الذاتية (وفق دليل المعمارية — المكدّس الموصى به، رخص MIT) ──
  # لا تعمل افتراضياً؛ شغّلها عند الحاجة: docker compose --profile convert up -d
  # Stirling-PDF: أكثر من 60 عملية PDF (دمج/تقسيم/تحويل Office/ضغط/OCR) بواجهة وREST API
  stirling-pdf:
    image: stirlingtools/stirling-pdf:latest
    container_name: hakeem-stirling-pdf
    profiles: ["convert"]
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      LANGS: ar_AR,en_GB
    ports:
      - "8081:8080"
    volumes:
      - hakeem-stirling-data:/usr/share/tessdata

  # Gotenberg: تحويل Office/HTML إلى PDF كخدمة API خلف حكيم (يغلّف LibreOffice وChromium)
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: hakeem-gotenberg
    profiles: ["convert"]
    ports:
      - "8082:3000"

  # ── محرّك البحث النصّي المتقدّم (اختياري) ──
  # لا يعمل افتراضياً؛ شغّله عند الحاجة: docker compose --profile search up -d
  # بعد التشغيل: OPENSEARCH_URL=https://localhost:9200 + اعتماد admin، ثم npm run index:opensearch -- --all
  # للإنتاج: استخدم خدمة مُدارة (AWS OpenSearch/Bonsai)، لا تضع كلمة السر في الملف.
  opensearch:
    image: opensearchproject/opensearch:3.7.0
    container_name: hakeem-opensearch
    profiles: ["search"]
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-Hakeem_Str0ng_Pass!2026}"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - hakeem-opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"

volumes:
  hakeem-postgres-data:
  hakeem-doc-tool-data:
  hakeem-stirling-data:
  hakeem-opensearch-data:
