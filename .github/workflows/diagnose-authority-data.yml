name: Diagnose Authority Data (read-only)

# تشخيص قرائي: ما البيانات المتوفّرة فعلاً لبنود «الحافة» (Citator/السلطة/السلوك)؟
# التعديلات · النسخ · روابط المادة↔الحكم · الأحكام · المبادئ · الرسم المعرفي · سجلّ البحث.
# قراءة فقط — لا كتابة. يفضّل NEON_DATABASE_URL؛ وإلا يعود إلى DATABASE_URL.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      FALLBACK_DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}" npm run db:generate
      - name: Diagnose authority data (read-only)
        run: |
          export DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}"
          if [ -z "$DATABASE_URL" ]; then echo "::error::لا اتصال (اضبط NEON_DATABASE_URL أو DATABASE_URL)."; exit 1; fi
          npm run diagnose:authority
