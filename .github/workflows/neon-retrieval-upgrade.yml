name: Neon Retrieval Upgrade (trgm + pgvector HNSW)

# يرقّي الاسترجاع على قاعدة Runtime (Neon):
#   1) فهارس GIN trigram للبحث النصّي السريع.
#   2) جدول embeddings (pgvector) + تعبئته من legal_articles.embedding (بلا إعادة توليد).
#   3) فهرس HNSW للبحث الدلالي التقريبي (ANN).
# يدوي فقط (workflow_dispatch). يكتب في DB ⇒ مُقفل خلف بوّابة المواءمة + حارس هدف.
#
# يستعمل سرّاً **مخصّصاً** NEON_DATABASE_URL (كتابة) — لا يلمس DATABASE_URL المشترك.
# قبل أي كتابة يتحقّق حارس الهدف أنّ القاعدة هي Neon الكبيرة فعلاً (وإلا يُلغى).

on:
  workflow_dispatch:
    inputs:
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: "اكتب NEON_RUNTIME_CONFIRMED لتأكيد الكتابة على Neon"
        type: string
        required: true
        default: ""
      limit:
        description: "حدّ أقصى لعدد المتجهات المنقولة (اختياري، فارغ = الكل)"
        type: string
        required: false
        default: ""

concurrency:
  group: neon-retrieval-upgrade
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    env:
      # سرّ مخصّص لـ Neon (كتابة) — منفصل عن DATABASE_URL المشترك (Supabase).
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      CONFIRM_RUNTIME_DB_ALIGNMENT: ${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}
    steps:
      # 🔒 بوّابة التأكيد.
      - name: "🔒 Runtime DB alignment gate"
        run: |
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then
            echo "::error::DB writes LOCKED — اضبط CONFIRM_RUNTIME_DB_ALIGNMENT=NEON_RUNTIME_CONFIRMED."
            exit 1
          fi

      - name: تحقق من سرّ Neon
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::يلزم ضبط السرّ NEON_DATABASE_URL (اتصال Neon بكتابة)."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      # 🛡️ حارس الهدف — يلغي كل شيء إن لم تكن القاعدة Neon الكبيرة (قراءة فقط).
      - name: "🛡️ Verify target is Neon (read-only)"
        run: npx tsx scripts/verify-neon-target.ts

      - name: "① الامتدادات + جدول embeddings + فهارس trigram"
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/sql/neon-retrieval-pre.sql

      - name: "② تعبئة جدول embeddings من legal_articles.embedding"
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then ARGS="--limit ${{ inputs.limit }}"; fi
          npx tsx scripts/backfill-embeddings-table.ts $ARGS

      - name: "③ بناء فهرس HNSW للبحث الدلالي (ANN)"
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/sql/neon-retrieval-hnsw.sql

      - name: "④ تحقق (قراءة فقط)"
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT count(*) AS embeddings_rows FROM embeddings;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "SELECT indexname FROM pg_indexes WHERE indexname IN ('idx_embeddings_hnsw_cosine','idx_legal_articles_content_trgm');"
