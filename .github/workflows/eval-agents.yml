name: Eval Agents (effectiveness)

# يقيس فعالية طبقة الوكلاء (النيّة/الاسترجاع/الامتناع/الحصر/التأصيل) على القاعدة الحيّة.
# قراءة فقط. النموذج يعمل إن توفّر مفتاحه (AI_PROVIDER + مفتاح)، وإلا يُقاس ما لا يحتاجه.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval-agents:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      FALLBACK_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEMANTIC_SEARCH: "true"
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # النموذج للتحليل (اختياري — يسقط آمناً إلى offline إن غاب)
      AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      SETTINGS_SECRET: ${{ secrets.SETTINGS_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}" npm run db:generate
      - name: Run agent effectiveness eval
        run: |
          export DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}"
          if [ -z "$DATABASE_URL" ]; then echo "::error::لا اتصال قاعدة"; exit 1; fi
          NODE_OPTIONS='--conditions=react-server' npm run eval:agents
