name: Index OpenSearch (فهرسة المحتوى)

# يفهرس المواد والأحكام والمبادئ من Neon إلى عنقود OpenSearch (كتابة على العنقود
# لا على القاعدة). مُقفل خلف تأكيد. يقرأ القاعدة عبر NEON_DATABASE_URL،
# ويكتب في العنقود عبر أسرار OPENSEARCH_*. شغّله بعد إنشاء العنقود وضبط الأسرار.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'اكتب INDEX لتأكيد الفهرسة'
        type: string
        required: true
        default: ""
      scope:
        description: 'all (كل المحتوى) أو sample (عيّنة ٢٠٠)'
        type: choice
        options: ["all", "sample"]
        default: "all"
        required: true
      index_suffix:
        description: 'لاحقة أسماء الفهارس (مثل _v2 لبناء فهرس مُحسّن دون مساس بالحالي). فارغ = الحالي.'
        type: string
        default: ""

concurrency:
  group: index-opensearch
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  index:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
      OPENSEARCH_USERNAME: ${{ secrets.OPENSEARCH_USERNAME }}
      OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
      # لاحقة أسماء الفهارس (فارغة = الفهرس الحيّ؛ _v2 = فهرس مُحسّن بالتوازي).
      OPENSEARCH_INDEX_LEGAL_ARTICLES: "legal_articles${{ inputs.index_suffix }}"
      OPENSEARCH_INDEX_JUDICIAL_CASES: "judicial_cases${{ inputs.index_suffix }}"
    steps:
      - name: "تحقّق من الأسرار"
        run: |
          if [ "${{ inputs.confirm }}" != "INDEX" ]; then echo "::error::اكتب INDEX للتأكيد."; exit 1; fi
          if [ -z "$DATABASE_URL" ]; then echo "::error::NEON_DATABASE_URL مفقود (لقراءة المحتوى)."; exit 1; fi
          if [ -z "$OPENSEARCH_URL" ]; then echo "::error::OPENSEARCH_URL مفقود (وجهة الفهرسة)."; exit 1; fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run db:generate

      - name: "🛡️ حارس هدف Neon (قراءة فقط)"
        run: npx tsx scripts/verify-neon-target.ts

      - name: "فهرسة OpenSearch"
        run: |
          if [ "${{ inputs.scope }}" = "all" ]; then
            npm run index:opensearch -- --all
          else
            npm run index:opensearch
          fi

      - name: "تحقّق بعد الفهرسة (عدد المستندات)"
        run: |
          IDX_A="${OPENSEARCH_INDEX_LEGAL_ARTICLES:-legal_articles}"
          IDX_C="${OPENSEARCH_INDEX_JUDICIAL_CASES:-judicial_cases}"
          AUTH=""
          if [ -n "$OPENSEARCH_USERNAME" ]; then AUTH="-u $OPENSEARCH_USERNAME:$OPENSEARCH_PASSWORD"; fi
          echo "المواد:"; curl -s $AUTH "$OPENSEARCH_URL/$IDX_A/_count" || true
          echo ""; echo "الأحكام/المبادئ:"; curl -s $AUTH "$OPENSEARCH_URL/$IDX_C/_count" || true
