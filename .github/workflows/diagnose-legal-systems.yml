name: Diagnose Legal Systems (read-only)

# تشخيص قرائي لقاعدة الأنظمة والبحث: توزيع المواد، تغطية التضمين، تشظّي الأسماء،
# وانحياز تمثيل البحث. قراءة فقط — لا كتابة، لا seed، لا backfill.
#
# يفضّل سرّ NEON_DATABASE_URL (قراءة) لرؤية الإنتاج الحقيقي؛ وإلا يعود إلى DATABASE_URL.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      FALLBACK_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # تفعيل قياس الدلالي في التشخيص (اختياري — يسقط آمناً للمعجمي إن غاب المفتاح).
      SEMANTIC_SEARCH: "true"
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}" npm run db:generate
      - name: Diagnose legal systems (read-only)
        run: |
          export DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}"
          if [ -z "$DATABASE_URL" ]; then echo "::error::لا اتصال (اضبط NEON_DATABASE_URL أو DATABASE_URL)."; exit 1; fi
          npm run diagnose:systems
