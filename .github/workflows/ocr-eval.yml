# قياس دقّة استخراج النص (OCR) — CER/WER على مجموعة عربية موسومة.
# يقارن: Tesseract الخام مقابل Tesseract مع المعالجة المسبقة نفسها في المنصّة
# (تدرّج رمادي + Otsu + تكبير) — ليُثبت مكسب الجودة رقمياً.
# يُشغَّل يدوياً: Actions → OCR Accuracy Eval → Run
name: OCR Accuracy Eval

on:
  workflow_dispatch:
    inputs:
      goldset:
        description: "مجلد مجموعة القياس (داخل tools/ocr-eval)"
        default: "goldset/legal"
        required: false
      engines:
        description: "المحرّكات (بفواصل)"
        default: "mock,tesseract,tesseract_prep"
        required: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Tesseract (+ Arabic model)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-ara
      - name: Install Python deps
        run: pip install rapidfuzz jiwer Pillow
      - name: Run OCR eval
        working-directory: tools/ocr-eval
        run: |
          # المحرّكات تُمرَّر مفصولةً بمسافات (argparse nargs=+): نحوّل الفواصل لمسافات
          ENGINES="$(echo '${{ github.event.inputs.engines }}' | tr ',' ' ')"
          [ -z "$ENGINES" ] && ENGINES="mock tesseract tesseract_prep"
          python run_eval.py --gold "${{ github.event.inputs.goldset || 'goldset/legal' }}" \
            --engines $ENGINES | tee eval-console.txt
      - name: Show latest summary
        working-directory: tools/ocr-eval
        run: |
          echo "## نتيجة قياس OCR" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat eval-console.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          latest=$(ls -t reports/*_summary.md 2>/dev/null | head -1)
          if [ -n "$latest" ]; then cat "$latest" >> "$GITHUB_STEP_SUMMARY"; fi
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: ocr-eval-reports
          path: tools/ocr-eval/reports/
