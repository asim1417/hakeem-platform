name: Apply Audit Migrations (Neon) — تطبيق مهاجرات التدقيق

# يطبّق مهاجرتَي التدقيق على Neon (إضافة فهارس/قيد فقط — بلا مساس بالبيانات):
#   1) قيد «نسخة نافذة واحدة» (article_versions partial unique)
#   2) فهارس الأداء (HNSW على embeddings + search_norm GIN/trgm)
# مُقفَل: تأكيد APPLY + حارس مواءمة Neon + فحص أمان مسبق (0 تعارض نسخة).
# idempotent (IF NOT EXISTS). لا يحذف بيانات.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'اكتب APPLY لتأكيد التطبيق على Neon'
        type: string
        required: true
        default: ""
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: 'اكتب NEON_RUNTIME_CONFIRMED لتأكيد أن الهدف هو Neon'
        type: string
        required: true
        default: ""

concurrency:
  group: apply-audit-migrations
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      PGURL: ${{ secrets.NEON_DATABASE_URL }}
      CONFIRM_RUNTIME_DB_ALIGNMENT: ${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}
    steps:
      - name: "تحقّق"
        run: |
          if [ "${{ inputs.confirm }}" != "APPLY" ]; then echo "::error::اكتب APPLY للتأكيد."; exit 1; fi
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then echo "::error::اكتب NEON_RUNTIME_CONFIRMED."; exit 1; fi
          if [ -z "$PGURL" ]; then echo "::error::NEON_DATABASE_URL مفقود."; exit 1; fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run db:generate

      - name: "🛡️ حارس هدف Neon"
        run: npx tsx scripts/verify-neon-target.ts

      - name: "تثبيت psql"
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: "فحص أمان: 0 تعارض نسخة نافذة قبل إضافة القيد"
        run: |
          CONFLICTS=$(psql "$PGURL" -t -A -c "SELECT count(*) FROM (SELECT article_id FROM article_versions WHERE effective_to IS NULL GROUP BY article_id HAVING count(*)>1) t;")
          echo "تعارضات النسخة النافذة: $CONFLICTS"
          if [ "$CONFLICTS" != "0" ]; then echo "::error::يوجد $CONFLICTS تعارض — نظّفه قبل إضافة القيد."; exit 1; fi

      - name: "① تطبيق قيد النسخة النافذة الواحدة"
        run: psql "$PGURL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260711120000_article_version_one_current/migration.sql

      - name: "② تطبيق فهارس الأداء (HNSW + search_norm GIN)"
        run: psql "$PGURL" -v ON_ERROR_STOP=1 -f prisma/migrations/20260712120000_search_performance_indexes/migration.sql

      - name: "تحقّق: الفهارس/القيد أُنشئت"
        run: |
          echo "— article_versions —"
          psql "$PGURL" -c "\d article_versions" | grep -i "one_current" || echo "(لم يظهر الفهرس الفريد — راجع)"
          echo "— embeddings —"
          psql "$PGURL" -c "SELECT indexname FROM pg_indexes WHERE tablename='embeddings';"
          echo "— legal_articles search_norm —"
          psql "$PGURL" -c "SELECT column_name FROM information_schema.columns WHERE table_name='legal_articles' AND column_name='search_norm';"
