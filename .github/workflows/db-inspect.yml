name: DB Inspect

# فحص قاعدة البيانات التي يشير إليها DATABASE_URL: يعرض الجداول وأعداد الصفوف.
# تشغيل يدوي. لا يكتب شيئاً — قراءة فقط.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: تحقق من السرّ
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::السرّ DATABASE_URL غير مضبوط."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Inspect database
        run: npx tsx scripts/db-inspect.ts
