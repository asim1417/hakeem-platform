name: Legal Thesaurus — Measure coverage (read-only)

# يقيس تغطية المكنز للمواد (قراءة فقط) لتقدير ما سيسقط من عدّادات لوحة الجودة.
# لا يكتب في القاعدة. يفضّل NEON_DATABASE_URL ثم DATABASE_URL.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  measure:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      FALLBACK_DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}" npm run db:generate
      - name: Measure coverage (read-only)
        run: |
          export DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}"
          if [ -z "$DATABASE_URL" ]; then echo "::error::لا اتصال (NEON_DATABASE_URL أو DATABASE_URL)."; exit 1; fi
          npm run thesaurus:measure
