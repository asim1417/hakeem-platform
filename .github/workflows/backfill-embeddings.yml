name: Backfill Embeddings (تضمين دلالي pgvector)

# يولّد متجهات دلالية ويخزّنها في جدول pgvector «embeddings».
# يدعم أنواعًا متعدّدة عبر --target (articles|rulings|principles|all).
# يدوي فقط (workflow_dispatch). يتطلّب: NEON_DATABASE_URL + EMBEDDING_API_KEY (أو OPENAI_API_KEY).
# المهاجرات/السكربت المُحدَّث على فرع التدقيق — شغّله باختيار claude/website-visual-audit-kihjic.

on:
  workflow_dispatch:
    inputs:
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: "اكتب NEON_RUNTIME_CONFIRMED لتأكيد مواءمة قاعدة Runtime قبل أي كتابة على DB"
        type: string
        required: true
        default: ""
      target:
        description: "الهدف (نوع المحتوى)"
        type: choice
        required: true
        default: all
        options:
          - all
          - articles
          - rulings
          - principles
      scope:
        description: "النطاق"
        type: choice
        required: true
        default: missing
        options:
          - missing
          - all
      limit:
        description: "حدّ أقصى (اختياري، فارغ = الكل)"
        type: string
        required: false
        default: ""

concurrency:
  group: backfill-embeddings
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      # [تدقيق] الكتابة تستهدف Neon صراحةً (كان secrets.DATABASE_URL قد يكون غير مُواءَم).
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CONFIRM_RUNTIME_DB_ALIGNMENT: ${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}
    steps:
      - name: "🔒 Runtime DB alignment gate"
        run: |
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then
            echo "::error::DB writes LOCKED — اضبط CONFIRM_RUNTIME_DB_ALIGNMENT=NEON_RUNTIME_CONFIRMED."
            exit 1
          fi
      - name: تحقق من الأسرار
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "::error::يلزم ضبط NEON_DATABASE_URL."; exit 1; fi
          if [ -z "$EMBEDDING_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::يلزم ضبط EMBEDDING_API_KEY (أو OPENAI_API_KEY)."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: "🛡️ حارس هدف Neon (يمنع الكتابة على قاعدة خاطئة)"
        run: npx tsx scripts/verify-neon-target.ts
      - name: Backfill embeddings
        run: |
          ARGS="--target ${{ inputs.target }}"
          if [ "${{ inputs.scope }}" = "all" ]; then ARGS="$ARGS --all"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          npx tsx scripts/backfill-embeddings.ts $ARGS
