name: Backfill Embeddings (تضمين دلالي pgvector)

# يولّد متجهات دلالية لمواد النواة ويخزّنها في LegalArticle.embedding،
# فيُفعَّل إعادة الترتيب الدلالي (يحتاج SEMANTIC_SEARCH=true في بيئة الإنتاج).
# يدوي فقط (workflow_dispatch). يتطلّب سرّين:
#   DATABASE_URL        = اتصال Supabase (قاعدة المنصّة).
#   EMBEDDING_API_KEY   = مفتاح مزوّد التضمين (OpenAI-compatible) — أو OPENAI_API_KEY.

on:
  workflow_dispatch:
    inputs:
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: "اكتب NEON_RUNTIME_CONFIRMED لتأكيد مواءمة قاعدة Runtime قبل أي كتابة على DB"
        type: string
        required: true
        default: ""
      target:
        description: "الهدف (نوع المحتوى)"
        type: choice
        required: true
        default: articles
        options:
          - articles    # المواد النظامية
          - rulings     # الأحكام القضائية
          - principles  # المبادئ القضائية
          - all         # الثلاثة معًا
      scope:
        description: "النطاق"
        type: choice
        required: true
        default: missing
        options:
          - missing   # ما بلا متجه فقط (تزايدي)
          - all       # إعادة توليد الكل
      limit:
        description: "حدّ أقصى (اختياري، فارغ = الكل)"
        type: string
        required: false
        default: ""

concurrency:
  group: backfill-embeddings
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      # [تدقيق] الكتابة تستهدف Neon صراحةً (كان secrets.DATABASE_URL قد يكون غير مُواءَم).
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # يقرأه السكربت كحارس داخلي للكتابة (scripts/backfill-embeddings.ts) — لا بدّ من تمريره env.
      CONFIRM_RUNTIME_DB_ALIGNMENT: ${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}
    steps:
      # 🔒 Production DB writes are locked until Vercel Runtime DATABASE_URL and GitHub Actions DATABASE_URL are intentionally aligned.
      - name: "🔒 Runtime DB alignment gate"
        run: |
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then
            echo "::error::DB writes LOCKED — Runtime source of truth is Neon (neondb), not the GitHub/Supabase DB (bnzicgymocelefeqiwig). Set CONFIRM_RUNTIME_DB_ALIGNMENT=NEON_RUNTIME_CONFIRMED only after intentionally aligning DATABASE_URL."
            exit 1
          fi
      - name: تحقق من الأسرار
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::يلزم ضبط السرّ DATABASE_URL."
            exit 1
          fi
          if [ -z "$EMBEDDING_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::يلزم ضبط EMBEDDING_API_KEY (أو OPENAI_API_KEY)."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: "🛡️ حارس هدف Neon (يمنع الكتابة على قاعدة خاطئة)"
        run: npx tsx scripts/verify-neon-target.ts
      # [تدقيق] أُزيلت خطوة «ضمان عمود embedding» (psql على عمود Json مهجور) — التوليد
      # يذهب لجدول pgvector «embeddings» القائم (المرحلة ٥)، ولا psql على الرَنر.
      - name: Backfill embeddings
        run: |
          ARGS="--target ${{ inputs.target }}"
          if [ "${{ inputs.scope }}" = "all" ]; then ARGS="$ARGS --all"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          npx tsx scripts/backfill-embeddings.ts $ARGS
