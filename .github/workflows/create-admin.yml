name: Create/Reset Admin (Neon) — فكّ قفل الدخول

# ينشئ أو يُعيد تعيين مستخدم أدمن في قاعدة Neon (SYSTEM_ADMIN, isActive).
# كلمة المرور تأتي من سرّ ADMIN_PASSWORD (مُقنّعة في السجلّ — لا تُطبع أبدًا).
# يدوي فقط. اضبط الأسرار أولاً: ADMIN_EMAIL + ADMIN_PASSWORD (أو INITIAL_ADMIN_*).

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  create-admin:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL || secrets.INITIAL_ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || secrets.INITIAL_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Create/Reset admin
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "::error::NEON_DATABASE_URL غير مضبوط."; exit 1; fi
          npx tsx scripts/create-admin.ts
