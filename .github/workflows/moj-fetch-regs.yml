name: MOJ Fetch Regs (Playwright → data/moj-regs.json)

# يسحب نصوص مواد اللوائح التنفيذية الأربع المفقودة من بوابة العدل ويكتب data/moj-regs.json،
# ثم يدفعه إلى فرع claude/moj-regs-data لمراجعته عبر PR. قراءة من المصدر — لا قاعدة بيانات.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm }
      - name: Install Playwright Chromium
        run: npm i --no-save playwright@1.48.0 && npx playwright install --with-deps chromium
      - name: Fetch regulations from MOJ gateway (read-only source)
        run: node scripts/moj-fetch-regs.mjs
      - name: Commit & push data artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B claude/moj-regs-data
          git add data/moj-regs.json
          if git diff --cached --quiet; then echo "لا تغييرات."; exit 0; fi
          printf '%s\n\n%s\n%s\n' \
            "data(moj): نصوص مواد اللوائح التنفيذية الأربع من المصدر الرسمي" \
            "Co-Authored-By: Claude Opus 4.8 (1M context) <noreply@anthropic.com>" \
            "Claude-Session: https://claude.ai/code/session_013b7dDyeMWyxP13KtU5T7bv" > /tmp/moj_regs_msg.txt
          git commit -F /tmp/moj_regs_msg.txt
          git push -f origin claude/moj-regs-data
