name: Deploy Readiness Check

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  readiness:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:password@localhost:5432/hakeem?schema=public' }}
      NEXTAUTH_SECRET: deploy-readiness-check-secret
      NEXTAUTH_URL: http://localhost:3000
      AI_PROVIDER: offline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Security QA
        run: npm run qa:security

      - name: Citation extractor QA
        run: npm run qa:citations
