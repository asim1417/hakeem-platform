name: Compare Index Versions (read-only) — v1 مقابل v2 (الطبقة العربية)

# قراءة فقط: يقارن جودة الأحكام بين الفهرس الحالي والمُحسّن (_v2 بالعبارات المتلاصقة).
# لكل استعلام: أعلى 3 نتائج من كل فهرس جنبًا إلى جنب (نفس الاستعلام والأوزان).

on:
  workflow_dispatch:
    inputs:
      suffix:
        description: 'لاحقة الفهرس المُحسّن للمقارنة'
        type: string
        default: "_v2"

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    env:
      OPENSEARCH_URL: ${{ secrets.OPENSEARCH_URL }}
      OPENSEARCH_USERNAME: ${{ secrets.OPENSEARCH_USERNAME }}
      OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_PASSWORD }}
      SUF: ${{ inputs.suffix }}
    steps:
      - name: Compare v1 vs v2
        run: |
          set +e
          AUTH="-u ${OPENSEARCH_USERNAME}:${OPENSEARCH_PASSWORD}"
          QUERIES=("فسخ عقد الإيجار" "التعويض عن الضرر" "الفصل التعسفي من العمل" "المسؤولية التقصيرية" "بطلان العقد")
          run_q () {
            local IDX="$1"; local Q="$2"
            BODY=$(python3 -c "import json,sys; q=sys.argv[1]; print(json.dumps({'size':3,'_source':['judgmentTitle'],'query':{'bool':{'should':[{'match':{'judgmentText':{'query':q,'operator':'and','boost':4}}},{'match':{'judgmentText.phrase':{'query':q,'boost':4}}},{'match':{'judgmentText':{'query':q}}},{'match':{'judgmentTitle':{'query':q,'boost':3}}}],'minimum_should_match':1}}}))" "$Q")
            curl -s $AUTH -H 'Content-Type: application/json' "$OPENSEARCH_URL/$IDX/_search" -d "$BODY" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); h=d.get('hits',{}); t=h.get('total',{}); t=t.get('value',t) if isinstance(t,dict) else t; print(f'    ⏱️{d.get(\"took\",\"?\")}ms hits:{t}'); [print(f\"      {x['_score']:.1f} {(x['_source'].get('judgmentTitle') or '-')[:55]}\") for x in h.get('hits',[])]" 2>/dev/null || echo "      (تعذّر)"
          }
          for Q in "${QUERIES[@]}"; do
            echo "══════════ 🔎 $Q ══════════"
            echo "  ── v1 (الحالي) ──"; run_q "judicial_cases" "$Q"
            echo "  ── v2 (المُحسّن) ──"; run_q "judicial_cases${SUF}" "$Q"
          done
