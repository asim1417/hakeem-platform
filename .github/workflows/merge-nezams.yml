name: Merge Nezams Structural (gated)

# يدمج الطبقة البنيوية (0.9) من data/nezams_pairings.json في الرسم القائم (علاقات بين عُقدنا).
# diagnose: جاف. apply: كتابة مُقفلة خلف بوّابة + حارس Neon. لا يخفض الصريحة (0.98).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diagnose (جاف) أو apply (كتابة)"
        type: choice
        options: ["diagnose", "apply"]
        default: "diagnose"
        required: true
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: "للكتابة فقط: NEON_RUNTIME_CONFIRMED"
        type: string
        required: false
        default: ""

concurrency:
  group: merge-nezams
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  merge:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      CONFIRM_RUNTIME_DB_ALIGNMENT: ${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}
    steps:
      - name: تحقق من سرّ Neon
        run: |
          if [ -z "$DATABASE_URL" ]; then echo "::error::يلزم NEON_DATABASE_URL."; exit 1; fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: npm run db:generate
      - name: "🛡️ حارس الهدف Neon (قراءة فقط)"
        run: npx tsx scripts/verify-neon-target.ts
      - name: "معاينة الدمج (جاف)"
        if: ${{ inputs.mode == 'diagnose' }}
        run: npx tsx scripts/merge-nezams-structural.ts
      - name: "🔒 بوّابة الكتابة"
        if: ${{ inputs.mode == 'apply' }}
        run: |
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then
            echo "::error::DB writes LOCKED — اضبط CONFIRM_RUNTIME_DB_ALIGNMENT=NEON_RUNTIME_CONFIRMED مع mode=apply."
            exit 1
          fi
      - name: "دمج الطبقة البنيوية (كتابة)"
        if: ${{ inputs.mode == 'apply' }}
        run: npx tsx scripts/merge-nezams-structural.ts
