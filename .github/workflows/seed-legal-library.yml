name: Seed Legal Library (بذر المكتبة النظامية)

# يبذر المكتبة النظامية (9 أنظمة + 1981 مادة) + أدوار/صلاحيات RBAC في قاعدة المنصّة.
# idempotent بالكامل (upsert) — لا يحذف، لا يكرّر، لا يمسّ الأحكام المُرحَّلة.
# يدوي فقط (workflow_dispatch). يتطلّب السرّ: DATABASE_URL.
# اختياري: INITIAL_ADMIN_EMAIL / INITIAL_ADMIN_PASSWORD لإنشاء مدير أوّلي (إن لم يوجد).

on:
  workflow_dispatch:
    inputs:
      CONFIRM_RUNTIME_DB_ALIGNMENT:
        description: "اكتب NEON_RUNTIME_CONFIRMED لتأكيد مواءمة قاعدة Runtime قبل أي كتابة على DB"
        type: string
        required: true
        default: ""
      confirm:
        description: "اكتب SEED للتأكيد"
        type: string
        required: true
        default: ""

concurrency:
  group: seed-legal-library
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
      INITIAL_ADMIN_PASSWORD: ${{ secrets.INITIAL_ADMIN_PASSWORD }}
    steps:
      # 🔒 Production DB writes are locked until Vercel Runtime DATABASE_URL and GitHub Actions DATABASE_URL are intentionally aligned.
      - name: "🔒 Runtime DB alignment gate"
        run: |
          if [ "${{ inputs.CONFIRM_RUNTIME_DB_ALIGNMENT }}" != "NEON_RUNTIME_CONFIRMED" ]; then
            echo "::error::DB writes LOCKED — Runtime source of truth is Neon (neondb), not the GitHub/Supabase DB (bnzicgymocelefeqiwig). Set CONFIRM_RUNTIME_DB_ALIGNMENT=NEON_RUNTIME_CONFIRMED only after intentionally aligning DATABASE_URL."
            exit 1
          fi
      - name: تحقق من السرّ والتأكيد
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::يلزم ضبط السرّ DATABASE_URL."
            exit 1
          fi
          if [ "${{ inputs.confirm }}" != "SEED" ]; then
            echo "::error::اكتب SEED في حقل التأكيد لتشغيل البذر."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Apply schema (ensures tables/columns)
        run: npx prisma db push --skip-generate
      - name: Seed legal library (idempotent upserts)
        run: npm run db:seed
