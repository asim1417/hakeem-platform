name: Legal Thesaurus — Export for review (read-only)

# يصدّر المكنز (مفاهيم + قائمة مراجعة + JSON/SKOS) كـ artifact للتنزيل والمراجعة.
# قراءة فقط — لا كتابة في القاعدة. يفضّل NEON_DATABASE_URL ثم DATABASE_URL.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      FALLBACK_DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}" npm run db:generate
      - name: Export thesaurus (read-only)
        run: |
          export DATABASE_URL="${NEON_DATABASE_URL:-$FALLBACK_DATABASE_URL}"
          if [ -z "$DATABASE_URL" ]; then echo "::error::لا اتصال (NEON_DATABASE_URL أو DATABASE_URL)."; exit 1; fi
          npm run thesaurus:export
      - name: Emit JSON (gzip + base64)
        run: |
          f=out/legal-thesaurus/thesaurus-export.json
          echo "BYTES=$(wc -c < "$f")"
          echo "===HAKEEM_TERMS_GZ_B64_BEGIN==="
          gzip -c "$f" | base64 -w0
          echo ""
          echo "===HAKEEM_TERMS_GZ_B64_END==="
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-thesaurus-review
          path: out/legal-thesaurus/
          retention-days: 30
          if-no-files-found: error
