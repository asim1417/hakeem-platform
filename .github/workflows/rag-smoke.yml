name: RAG Retrieval Smoke (read-only)

# يثبت أنّ طبقة الاسترجاع تُرجع مصادر على بيانات حقيقية. قراءة فقط — لا كتابة،
# لا seed، لا backfill، لا AI. يستعمل DATABASE_URL كما هو (لا يغيّره).

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: تحقق من السرّ
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::يلزم ضبط السرّ DATABASE_URL (قراءة فقط)."
            exit 1
          fi
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: RAG retrieval smoke (read-only)
        run: npm run smoke:rag
