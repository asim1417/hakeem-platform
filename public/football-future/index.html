<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0F14" />
    <meta name="description" content="فوتبول فيوتشر — لعبة كرة قدم عربية للناشئين. اِلعب. تطوّر. انتصر." />
    <title>فوتبول فيوتشر — Football Future</title>
    <link rel="icon" href="/football-future/src/assets/icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/football-future/manifest.webmanifest" />
    <link rel="preload" href="/football-future/src/assets/fonts/noto-kufi-arabic-var-arabic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/football-future/src/css/fonts.css" />
    <link rel="stylesheet" href="/football-future/src/css/styles.css" />
  </head>
  <body>
    <noscript>هذه اللعبة تحتاج تفعيل JavaScript للعمل.</noscript>
    <!-- شاشة الإقلاع بالهوية -->
    <div id="ffSplash" class="ff-splash" aria-hidden="true">
      <img class="ff-splash-logo" src="/football-future/src/assets/logo.svg" alt="" />
      <div class="ff-splash-word">
        <strong>فوتبول فيوتشر</strong>
        <span>FOOTBALL FUTURE</span>
      </div>
      <div class="ff-splash-tag">اِلعب. تطوّر. انتصر.</div>
      <div class="ff-splash-loader"><i></i></div>
    </div>
    <div id="app"></div>
    <div id="installBanner" class="install-banner" role="dialog" aria-live="polite">
      <div><strong>تثبيت اللعبة</strong><br><small>يمكن تثبيت فوتبول فيوتشر كتطبيق على الجوال.</small></div>
      <div class="cta-row" style="margin:0"><button id="installNow" class="btn small" type="button">تثبيت</button><button id="dismissInstall" class="btn ghost small" type="button">لاحقًا</button></div>
    </div>
    <script src="/football-future/src/js/data.js"></script>
    <script src="/football-future/src/js/icons.js"></script>
    <script src="/football-future/src/js/audio.js"></script>
    <script src="/football-future/src/js/commentary.js"></script>
    <script src="/football-future/src/js/ui.js"></script>
    <script src="/football-future/src/js/game-engine.js"></script>
    <script src="/football-future/src/js/main.js"></script>
  </body>
</html>
